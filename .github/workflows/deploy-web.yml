name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # base-href must match the repo name so assets resolve at
      # https://<user>.github.io/welhof_app/
      # --pwa-strategy=none disables the service worker so deploys aren't
      # served stale from an aggressive app cache.
      - name: Build web
        run: flutter build web --release --base-href /welhof_app/ --pwa-strategy=none

      # --pwa-strategy=none writes an empty flutter_service_worker.js; replace
      # it with our self-destroying one so returning visitors' old caching
      # worker is cleared instead of left inert.
      - name: Install self-destroying service worker
        run: cp web/flutter_service_worker.js build/web/flutter_service_worker.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
