name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Android builds need a JDK; the web workflow doesn't.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pin the version used locally so the generated Android template matches
      # (an older stable scaffolds the legacy Groovy build.gradle).
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      # The native folders are not committed (regenerated by setup.ps1). Scaffold
      # android/ the same way, preserving the app's pubspec, then re-apply the
      # camera permission setup.ps1 adds.
      - name: Scaffold android/ (mirrors setup.ps1)
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml.bak
          flutter create --org com.welhof --project-name welhof_app --platforms=android .
          cp /tmp/pubspec.yaml.bak pubspec.yaml

      - name: Add camera permission to AndroidManifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.CAMERA" "$M" || sed -i \
            's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#&\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />#' \
            "$M"

      - name: Install dependencies
        run: flutter pub get

      # Proxy mode: same server-side proxy the web build targets (it holds the
      # Marello key + does WSSE). No credentials are baked into this build — the
      # proxy URL is not a secret. The release APK is debug-signed, so it installs
      # for testing without a release keystore.
      - name: Build release APK
        run: >
          flutter build apk --release
          --dart-define=MARELLO_ORDERS_ENDPOINT=https://staging-marello.welhof.com/welhof-proxy.php

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: welhof-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
